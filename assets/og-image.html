<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>computah og image</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: ui-monospace, "JetBrains Mono", "DejaVu Sans Mono", "SF Mono", monospace;
    background: #0d1117;
    color: #e6edf3;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 78px 90px;
    position: relative;
  }
  .prompt { color: #6e7681; font-size: 30px; margin-bottom: 26px; }
  .prompt .tick { color: #3fb950; }
  h1 { font-size: 150px; font-weight: 700; letter-spacing: -3px; line-height: 1; }
  .cursor { color: #3fb950; }
  .tag {
    font-size: 37px;
    color: #9da7b3;
    margin-top: 32px;
    max-width: 1000px;
    line-height: 1.35;
  }
  .wave { display: flex; align-items: flex-end; gap: 9px; height: 72px; margin-top: 50px; }
  .wave span { width: 9px; background: #2f81f7; border-radius: 3px; display: block; }
  .foot {
    position: absolute;
    bottom: 52px;
    left: 90px;
    right: 90px;
    display: flex;
    justify-content: space-between;
    font-size: 26px;
    color: #6e7681;
  }
</style>
</head>
<body>
  <div class="prompt"><span class="tick">$</span> say the wake word</div>
  <h1>computah<span class="cursor">_</span></h1>
  <div class="tag">a local, self-hosted voice assistant with a wake word you set and change yourself</div>
  <div class="wave" id="wave"></div>
  <div class="foot">
    <span>github.com/jamditis/computah</span>
    <span>wake &rarr; speech-to-text &rarr; brain &rarr; speech</span>
  </div>
  <script>
    // Static waveform glyph (deterministic), not a live audio meter.
    const wave = document.getElementById('wave');
    for (let i = 0; i < 46; i++) {
      const v = Math.abs(Math.sin(i * 0.5)) * Math.abs(Math.cos(i * 0.17));
      const bar = document.createElement('span');
      bar.style.height = (10 + v * 60).toFixed(0) + 'px';
      wave.appendChild(bar);
    }
  </script>
</body>
</html>
